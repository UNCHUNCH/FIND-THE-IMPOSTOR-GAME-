<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IMUPOSTOR</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:15px;
margin:10px;
font-size:18px;
cursor:pointer;
}

input{
padding:10px;
font-size:18px;
}

.screen{
display:none;
}

.active{
display:block;
}

</style>
</head>

<body>

<h1>IMUPOSTOR</h1>

<div id="menu" class="screen active">

<button onclick="createRoom()">Create Room</button>

<br><br>

<input id="roomInput" placeholder="Room Code">

<button onclick="joinRoom()">Join Room</button>

</div>


<div id="lobby" class="screen">

<h2 id="roomCode"></h2>

Players:

<div id="playerList"></div>

<br>

<button onclick="startGame()">Start Game</button>

</div>


<div id="roleScreen" class="screen">

<h2>Your Role</h2>

<h1 id="roleText"></h1>

<h2 id="wordText"></h2>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC2PkOFEVo3ujAf5An6raE3VljHWJZmG-o",
authDomain: "imupostor.firebaseapp.com",
projectId: "imupostor",
storageBucket: "imupostor.firebasestorage.app",
messagingSenderId: "927436604068",
appId: "1:927436604068:web:aaa75c6c8dd40695971c31"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room = "";
let playerId = Math.random().toString(36).substring(2);

const words = [
["Apple","Pear"],
["Dog","Wolf"],
["Car","Truck"],
["Coffee","Tea"],
["Pizza","Burger"],
["Cat","Tiger"],
["Plane","Helicopter"],
["Phone","Tablet"],
["School","University"],
["Chair","Sofa"]
];

function randomRoom(){
return Math.random().toString(36).substring(2,7).toUpperCase();
}

window.createRoom = function(){

room = randomRoom()

set(ref(db,"rooms/"+room+"/players/"+playerId),true)

document.getElementById("menu").classList.remove("active")
document.getElementById("lobby").classList.add("active")

document.getElementById("roomCode").innerText="Room: "+room

listenPlayers()

}

window.joinRoom = function(){

room=document.getElementById("roomInput").value.toUpperCase()

set(ref(db,"rooms/"+room+"/players/"+playerId),true)

document.getElementById("menu").classList.remove("active")
document.getElementById("lobby").classList.add("active")

document.getElementById("roomCode").innerText="Room: "+room

listenPlayers()

}

function listenPlayers(){

onValue(ref(db,"rooms/"+room+"/players"),snapshot=>{

let data=snapshot.val()

let html=""

for(let p in data){

html+="Player<br>"

}

document.getElementById("playerList").innerHTML=html

})

}

window.startGame=function(){

let pair=words[Math.floor(Math.random()*words.length)]

let goodWord=pair[0]
let impostorWord=pair[1]

onValue(ref(db,"rooms/"+room+"/players"),snapshot=>{

let players=Object.keys(snapshot.val())

let impostor=players[Math.floor(Math.random()*players.length)]

players.forEach(p=>{

let role="GOOD GUY"
let word=goodWord

if(p===impostor){

role="IMPOSTOR"
word=impostorWord

}

set(ref(db,"rooms/"+room+"/roles/"+p),{
role:role,
word:word
})

})

})

listenRole()

}

function listenRole(){

onValue(ref(db,"rooms/"+room+"/roles/"+playerId),snapshot=>{

if(!snapshot.exists()) return

let data=snapshot.val()

document.getElementById("lobby").classList.remove("active")
document.getElementById("roleScreen").classList.add("active")

document.getElementById("roleText").innerText=data.role
document.getElementById("wordText").innerText=data.word

})

}

</script>

</body>
</html>
