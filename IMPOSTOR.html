function createGame(){

roles = [];

let impostor = 1;
let mrwhite = 1;

roles.sort(()=>Math.random()-0.5);

impostorWord = pair[1];


document.getElementById("playerScreen").style.display="none";
document.getElementById("roleScreen").style.display="block";

currentPlayer = 0;

showRole();

}

}

}
